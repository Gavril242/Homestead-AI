  # ─── Purpose-grouped aliases (what Homestead calls) ─────────────────────────

  - model_name: purpose-plan
    litellm_params:
      model: vio-gpt5-high

  - model_name: purpose-synthesize
    litellm_params:
      model: vio-gpt5-chat

  - model_name: purpose-chat
    litellm_params:
      model: vio-gpt5-chat

  - model_name: purpose-verify
    litellm_params:
      model: vio-gpt5-chat

  - model_name: purpose-summarize
    litellm_params:
      model: vio-gpt5-medium

# ─── Router settings ────────────────────────────────────────────────────────

router_settings:
  routing_strategy: usage-based-routing-v2
  num_retries: 3
  retry_after: 5
  timeout: 120
  allowed_fails: 2
  cooldown_time: 60

  fallbacks:
    - purpose-plan:
        - vio-gpt5-high
        - vio-deepseek-r1
        - vio-claude-46-opus
        - vio-grok3
        - gemini-pro
    - purpose-synthesize:
        - vio-gpt5-chat
        - vio-gpt53-codex
        - vio-claude-46-sonnet
        - vio-qwen3-coder-480b
        - gemini-flash
    - purpose-chat:
        - vio-gpt5-chat
        - vio-gpt5-medium
        - vio-gpt4o
        - vio-grok3-mini
        - gemini-flash
    - purpose-verify:
        - vio-gpt5-chat
        - vio-gpt5-medium
        - vio-claude-46-sonnet
        - gemini-flash
    - purpose-summarize:
        - vio-gpt5-medium
        - vio-gpt5-mini
        - vio-grok3-mini
        - gemini-flash

# ─── LiteLLM settings ───────────────────────────────────────────────────────

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
