# LiteLLM Proxy — Homestead AI
#
# Run with: docker-compose up litellm
# Admin UI:  http://localhost:4000/ui  (login with LITELLM_MASTER_KEY)
#
# All VIO models use the openai/ prefix (OpenAI-compatible gateway).
# ssl_verify: false because VIO uses a self-signed cert.
# Models are named vio-<slug> individually; purpose-* aliases bundle fallback chains.

model_list:

  # ─── VIO: GPT-5 family ──────────────────────────────────────────────────────

  - model_name: vio-gpt5-high
    litellm_params:
      model: "openai/VIO:GPT-5-high"
      api_base: https://vio.automotive-wan.com:446
      api_key: os.environ/VIO_KEY_1
      rpm: 30
      ssl_verify: false

